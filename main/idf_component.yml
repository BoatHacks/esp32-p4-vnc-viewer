dependencies:
  idf: ">=5.4"

  # Waveshare's board support package for this exact board: MIPI-DSI panel
  # init (via espressif/esp_lcd_ek79007), touch controller, backlight, I2C bus.
  waveshare/esp32_p4_wifi6_touch_lcd_7b: "^1.0.2"

  # Lets the ESP32-P4 use the standard esp_wifi API while the radio itself
  # lives on the onboard ESP32-C6, reached over SDIO.
  espressif/esp_wifi_remote: "*"
  espressif/esp_hosted: "*"

  # NOTE: package names/versions on the component registry do shift over
  # time. If `idf.py add-dependency` reports a different name for the
  # hosted-transport component than `espressif/esp_hosted`, use whatever
  # it resolves to - the Wiki's own instructions are the source of truth:
  #   idf.py add-dependency "espressif/esp_wifi_remote"
  #   idf.py add-dependency "espressif/esp_hosted"

  # Wraps our already-initialized panel/touch handles in LVGL for the
  # Wi-Fi setup screens. Deliberately used instead of the BSP's own
  # bsp_display_start() so the LVGL wiring doesn't depend on guessing this
  # BSP release's internal API - esp_lvgl_port's "bring your own handles"
  # surface (lvgl_port_add_disp/lvgl_port_add_touch) is stable across
  # Espressif's BSP ecosystem.
  espressif/esp_lvgl_port: "*"
  lvgl/lvgl: "*"
