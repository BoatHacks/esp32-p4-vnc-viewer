name: Build and attach firmware

# Runs whenever a release is published. Builds the firmware with the
# official ESP-IDF Docker image and uploads:
#  - a single merged binary (bootloader + partition table + ota_data +
#    app, all combined via `idf.py merge-bin`) that flashes at offset
#    0x0 - the simplest option for a from-scratch flash
#  - the same four binaries unmerged, for anyone who wants to flash them
#    individually or inspect/replace just one
# The app image is separately named to match what ota_update.c looks for
# (OTA_ASSET_NAME in main.c) - OTA itself only ever needs that one file.
on:
  release:
    types: [published]

  # Lets you re-run this by hand from the Actions tab against an existing
  # release tag, e.g. after fixing a build issue without cutting a new one.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and attach the binary to"
        required: true

permissions:
  contents: write # needed for `gh release upload`

env:
  IDF_TARGET: esp32p4
  IDF_VERSION: v5.3
  ASSET_NAME: esp32-p4-vnc-viewer.bin
  MERGED_ASSET_NAME: esp32-p4-vnc-viewer-merged.bin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Build firmware with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: ${{ env.IDF_TARGET }}
          # Explicit set-target first: there's no committed sdkconfig (only
          # sdkconfig.defaults), and idf.py build needs the target
          # resolved one way or another before it can proceed.
          # merge-bin runs after build and reads the project's actual
          # partition table/flash settings, so its offsets always match
          # this build - no hardcoded addresses to keep in sync here.
          command: idf.py set-target ${{ env.IDF_TARGET }} && idf.py build && idf.py merge-bin

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp build/merged-binary.bin "release-assets/${MERGED_ASSET_NAME}"
          # The app image is named after the CMake project() name and
          # gets the fixed OTA asset name; the other three keep their
          # normal idf.py build names so they're recognizable next to
          # the offsets documented in the README.
          cp build/esp32_p4_vnc_viewer.bin "release-assets/${ASSET_NAME}"
          cp build/bootloader/bootloader.bin release-assets/bootloader.bin
          cp build/partition_table/partition-table.bin release-assets/partition-table.bin
          cp build/ota_data_initial.bin release-assets/ota_data_initial.bin

      - name: Attach binaries to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          gh release upload "$tag" release-assets/*.bin --repo "${{ github.repository }}" --clobber
