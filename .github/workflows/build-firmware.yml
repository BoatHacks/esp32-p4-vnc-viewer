name: Build and attach firmware

# Runs whenever a release is published (i.e. right after `gh release
# create`, which is the last step of the "send it!" workflow). Builds the
# firmware with the official ESP-IDF Docker image and uploads the
# resulting binary to that same release, named to match what
# ota_update.c looks for (OTA_ASSET_NAME in main.c).
on:
  release:
    types: [published]

  # Lets you re-run this by hand from the Actions tab against an existing
  # release tag, e.g. after fixing a build issue without cutting a new one.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and attach the binary to"
        required: true

permissions:
  contents: write # needed for `gh release upload`

env:
  IDF_TARGET: esp32p4
  IDF_VERSION: v5.3
  ASSET_NAME: esp32-p4-vnc-viewer.bin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Build firmware with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: ${{ env.IDF_TARGET }}
          # Explicit set-target first: there's no committed sdkconfig (only
          # sdkconfig.defaults), and idf.py build needs the target
          # resolved one way or another before it can proceed.
          command: idf.py set-target ${{ env.IDF_TARGET }} && idf.py build

      - name: Rename to the asset name OTA looks for
        run: |
          # build/ also contains bootloader.bin, partition-table.bin,
          # ota_data_initial.bin etc. - "*.bin" would match all of them.
          # The app image is named after the CMake project() name.
          cp build/esp32_p4_vnc_viewer.bin "${ASSET_NAME}"

      - name: Attach binary to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          gh release upload "$tag" "${ASSET_NAME}" --repo "${{ github.repository }}" --clobber
